<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --bg:#F2F5F4; --surface:#FFFFFF; --surface-2:#E9EEEC; --line:#D7DEDB;
  --text:#16221F; --text-dim:#5A6B66; --accent:#0E7C72; --accent-dim:#0B6259;
  --warn:#B5750D; --danger:#C53B3B; --ok:#1E8A52;
  --shadow: 0 1px 2px rgba(20,30,28,0.06), 0 4px 14px rgba(20,30,28,0.05);
  --radius: 10px;
}
[data-theme="dark"]{
  --bg:#101816; --surface:#16201D; --surface-2:#1D2925; --line:#2A3A35;
  --text:#EAF1EE; --text-dim:#8FA39C; --accent:#34C9B8; --accent-dim:#2AA597;
  --warn:#E1A23E; --danger:#E26464; --ok:#4BC07F;
  --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
.rt-root{
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  min-height:100%; padding:0; transition:background .2s,color .2s;
}
.rt-mono{font-family:'JetBrains Mono',monospace;}
.rt-display{font-family:'Space Grotesk',sans-serif;}

.rt-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 22px; border-bottom:1px solid var(--line); background:var(--surface);
  position:sticky; top:0; z-index:20;
}
.rt-brand{display:flex; align-items:center; gap:12px;}
.rt-logo{
  width:36px;height:36px;border-radius:9px;background:transparent;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  flex-shrink:0;
}
[data-theme="dark"] .rt-logo{background:#fff; padding:3px;}
.rt-logo img{width:100%;height:100%;object-fit:contain;}

.rt-avatar{
  width:88px;height:88px;border-radius:50%;background:var(--surface-2); border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0; color:var(--text-dim); font-size:30px;
}
.rt-avatar img{width:100%;height:100%;object-fit:cover;}
.rt-avatar-row{display:flex; align-items:center; gap:18px; margin-bottom:18px;}
.rt-upload-label{
  display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:12.5px; font-weight:600;
  color:var(--accent); padding:8px 13px; border:1px solid var(--accent); border-radius:7px; background:transparent;
}
.rt-upload-label:hover{background:rgba(14,124,114,0.08);}
.rt-upload-label input{display:none;}

.rt-switch{position:relative; display:inline-block; width:42px; height:24px; flex-shrink:0;}
.rt-switch input{opacity:0; width:0; height:0;}
.rt-switch-slider{position:absolute; cursor:pointer; inset:0; background:var(--line); border-radius:24px; transition:background .15s;}
.rt-switch-slider::before{position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,0.25);}
.rt-switch input:checked + .rt-switch-slider{background:var(--accent);}
.rt-switch input:checked + .rt-switch-slider::before{transform:translateX(18px);}
.rt-brand h1{font-size:17px; margin:0; font-family:'Space Grotesk',sans-serif; letter-spacing:-0.01em;}
.rt-brand p{font-size:11.5px; margin:0; color:var(--text-dim);}
.rt-header-actions{display:flex; gap:8px; align-items:center;}

.rt-iconbtn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);
  color:var(--text); display:flex;align-items:center;justify-content:center;cursor:pointer; font-size:16px;
  transition:background .15s, transform .1s;
}
.rt-iconbtn:hover{background:var(--line);}
.rt-iconbtn:active{transform:scale(0.95);}

.rt-tabs{display:flex; gap:4px; padding:10px 22px 0; background:var(--surface); border-bottom:1px solid var(--line);}
.rt-tab{
  padding:10px 14px; font-size:13px; font-weight:600; color:var(--text-dim); cursor:pointer;
  border-bottom:2px solid transparent; user-select:none;
}
.rt-tab.active{color:var(--accent); border-bottom-color:var(--accent);}

.rt-body{padding:20px 22px 60px; max-width:880px; margin:0 auto;}

.rt-card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px 18px 20px; margin-bottom:16px; box-shadow:var(--shadow);
}
.rt-card h2{
  font-family:'Space Grotesk',sans-serif; font-size:14px; margin:0 0 4px; letter-spacing:0.01em;
  display:flex; align-items:center; gap:8px;
}
.rt-card .rt-step-no{
  width:20px;height:20px;border-radius:5px;background:var(--accent);color:#fff;font-size:11px;
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;flex-shrink:0;
}
.rt-card .rt-sub{font-size:12px; color:var(--text-dim); margin:0 0 14px;}

.rt-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
.rt-grid.rt-grid-3{grid-template-columns:repeat(3,1fr);}
@media (max-width:560px){ .rt-grid, .rt-grid.rt-grid-3{grid-template-columns:1fr;} }

.rt-field{display:flex; flex-direction:column; gap:5px;}
.rt-field label{font-size:11.5px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.03em;}
.rt-field input, .rt-field select{
  background:var(--surface); border:1px solid var(--line); border-radius:7px; padding:9px 10px;
  font-size:13.5px; color:var(--text); font-family:'Inter',sans-serif; width:100%;
}
.rt-field input:focus, .rt-field select:focus{outline:2px solid var(--accent); outline-offset:-1px;}
.rt-field .rt-hint{font-size:10.5px; color:var(--text-dim);}
.rt-field input[readonly]{
  color:var(--accent); font-family:'JetBrains Mono',monospace; font-weight:600;
  background:var(--surface-2); border-style:dashed; border-color:var(--accent);
}

.rt-divider{height:1px; background:var(--line); margin:14px 0;}

.rt-flowcalc{
  background:var(--surface-2); border-radius:8px; padding:12px 14px; margin-top:10px;
  display:flex; flex-wrap:wrap; gap:14px; font-size:12.5px;
}
.rt-flowcalc div{display:flex; flex-direction:column; gap:2px;}
.rt-flowcalc .v{font-family:'JetBrains Mono',monospace; font-size:14.5px; font-weight:600;}
.rt-flowcalc .l{color:var(--text-dim); font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em;}

.rt-badge{
  display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:99px;
  font-size:12px; font-weight:700; font-family:'Space Grotesk',sans-serif;
}
.rt-badge.over{background:rgba(197,59,59,0.13); color:var(--danger);}
.rt-badge.irit{background:rgba(30,138,82,0.13); color:var(--ok);}
.rt-badge.pas{background:rgba(14,124,114,0.13); color:var(--accent);}

.rt-result-hero{
  display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  padding:16px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2);
}
.rt-result-hero .big{font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; line-height:1;}
.rt-result-hero .label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px;}

.rt-table{width:100%; border-collapse:collapse; font-size:12.5px;}
.rt-table th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-dim);
  padding:6px 8px; border-bottom:1px solid var(--line); font-weight:600;
}
.rt-table td{padding:7px 8px; border-bottom:1px solid var(--line); font-family:'JetBrains Mono',monospace;}
.rt-table tr:last-child td{border-bottom:none;}

.rt-btn{
  border:none; border-radius:8px; padding:11px 18px; font-size:13.5px; font-weight:600; cursor:pointer;
  font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:7px; transition:filter .15s, transform .1s;
}
.rt-btn:active{transform:scale(0.98);}
.rt-btn-primary{background:var(--accent); color:#fff;}
.rt-btn-primary:hover{filter:brightness(1.08);}
.rt-btn-ghost{background:var(--surface-2); color:var(--text); border:1px solid var(--line);}
.rt-btn-ghost:hover{background:var(--line);}
.rt-btn-danger{background:rgba(197,59,59,0.12); color:var(--danger);}
.rt-btn-row{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}

.rt-history-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 14px;
  border:1px solid var(--line); border-radius:9px; margin-bottom:9px; background:var(--surface);
  cursor:pointer; transition:border-color .15s;
}
.rt-history-item:hover{border-color:var(--accent);}
.rt-history-item .meta{font-size:11px; color:var(--text-dim); margin-top:2px;}
.rt-history-item .name{font-weight:600; font-size:13.5px;}
.rt-empty{text-align:center; padding:40px 20px; color:var(--text-dim); font-size:13px;}
.rt-empty .ic{font-size:30px; margin-bottom:10px;}

.rt-select-check{display:flex; align-items:center; padding-right:2px; flex-shrink:0;}
.rt-select-check input{width:18px; height:18px; accent-color:var(--accent); cursor:pointer;}
.rt-history-item.selected{border-color:var(--accent); background:rgba(14,124,114,0.06);}

.rt-combine-bar{
  position:sticky; bottom:14px; margin-top:6px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:var(--surface); border:1px solid var(--accent); border-radius:12px;
  padding:11px 14px; box-shadow:var(--shadow); font-size:12.5px; font-weight:600; z-index:15;
}
.rt-combine-bar .rt-btn{padding:8px 14px; font-size:12.5px;}
.rt-combine-bar[data-disabled="true"] #rtCombineGo{opacity:0.5; pointer-events:none;}

.rt-combined-table td, .rt-combined-table th{white-space:nowrap;}

[data-theme="dark"] .rt-indikator-card .rt-result-hero .label,
[data-theme="dark"] .rt-indikator-card .rt-sub,
[data-theme="dark"] .rt-indikator-card .rt-table th,
[data-theme="dark"] .rt-indikator-card .rt-table td{
  color:#fff;
}

.rt-filter-bar{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
.rt-filter-bar .rt-field{flex:1; min-width:180px; margin:0;}
.rt-filter-bar .rt-btn{padding:9px 12px; font-size:12.5px;}

.rt-pill-row{display:flex; gap:7px; flex-wrap:wrap; margin-top:10px;}
.rt-pill{
  background:var(--surface-2); border:1px solid var(--line); border-radius:99px; padding:5px 11px;
  font-size:11.5px; font-family:'JetBrains Mono',monospace;
}

.rt-detail-modal{
  position:fixed; inset:0; background:rgba(10,14,13,0.55); display:flex; align-items:flex-start;
  justify-content:center; padding:30px 16px; z-index:50; overflow-y:auto;
}
.rt-detail-card{
  background:var(--surface); border-radius:12px; max-width:640px; width:100%; padding:22px;
  border:1px solid var(--line); box-shadow:var(--shadow);
}
.rt-detail-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;}

@media print{
  .rt-no-print{display:none !important;}
  .rt-root{background:#fff !important; color:#000 !important;}
  .rt-card, .rt-detail-card{box-shadow:none !important; border:1px solid #ccc !important; background:#fff !important;}
}
</style>

  // ---------- storage (window.storage saat di Claude.ai, localStorage saat berdiri sendiri/APK) ----------
  function hasNativeStorage(){
    return typeof window !== 'undefined' && typeof window.storage !== 'undefined' && window.storage !== null;
  }
  async function storageGet(key){
    if(hasNativeStorage()){
      try{
        const r = await window.storage.get(key);
        return r ? r.value : null;
      }catch(e){ return null; }
    } else {
      try{ return localStorage.getItem('rt_'+key); }catch(e){ return null; }
    }
  }
  async function storageSet(key, value){
    if(hasNativeStorage()){
      try{ await window.storage.set(key, value); return true; }catch(e){ console.error('storage.set gagal', e); return false; }
    } else {
      try{ localStorage.setItem('rt_'+key, value); return true; }catch(e){ console.error('localStorage.setItem gagal', e); return false; }
    }
  }

  async function loadAll(){
    try{
      const t = await storageGet('rt-theme');
      if(t) state.theme = t;
    }catch(e){}
    try{
      const r = await storageGet('rt-records');
      if(r) state.records = JSON.parse(r);
    }catch(e){ state.records = []; }
    try{
      const rem = await storageGet('rt-reminder');
      if(rem) state.reminder = {...state.reminder, ...JSON.parse(rem)};
    }catch(e){}
    try{
      const prof = await storageGet('rt-profile');
      if(prof) state.profile = {...state.profile, ...JSON.parse(prof)};
    }catch(e){}
    form.leader = state.profile.name || '';
    applyTheme();
    render();
    updateAvatarButton();
    startReminderChecker();
  }
  async function saveTheme(){
    await storageSet('rt-theme', state.theme);
  }
  async function saveRecords(){
    const ok = await storageSet('rt-records', JSON.stringify(state.records));
    if(!ok) alert('Gagal menyimpan laporan ke penyimpanan perangkat. Coba lagi, atau cek apakah penyimpanan/izin browser tidak penuh/diblokir.');
  }
  async function saveReminder(){
    await storageSet('rt-reminder', JSON.stringify(state.reminder));
  }
  async function saveProfile(){
    await storageSet('rt-profile', JSON.stringify(state.profile));
  }

  function applyTheme(){
    root.setAttribute('data-theme', state.theme);
  }

  // ---------- reminder ----------
  let reminderTimer = null;

  function jamSejakTerakhirIsi(){
    if(state.records.length === 0) return null;
    const last = new Date(state.records[0].savedAt);
    return (Date.now() - last.getTime()) / 3600000;
  }

  function checkReminderDue(){
    if(!state.reminder.enabled) return false;
    const jam = jamSejakTerakhirIsi();
    if(jam === null) return true; // belum pernah isi laporan sama sekali
    return jam >= state.reminder.intervalHours;
  }

  function renderReminderBanner(){
    const existing = document.getElementById('rtReminderBanner');
    if(existing) existing.remove();
    if(!checkReminderDue()) return;
    const jam = jamSejakTerakhirIsi();
    const teks = jam === null
      ? 'Belum ada laporan tersimpan sama sekali. Yuk isi laporan produksi sekarang.'
      : `Sudah ${fmt(jam,1)} jam sejak laporan terakhir disimpan (target setiap ${state.reminder.intervalHours} jam). Saatnya isi laporan resin!`;
    const banner = document.createElement('div');
    banner.id = 'rtReminderBanner';
    banner.className = 'rt-no-print';
    banner.style.cssText = 'background:rgba(181,117,13,0.12); border:1px solid var(--warn); color:var(--warn); border-radius:10px; padding:12px 14px; margin:0 22px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13px; font-weight:600;';
    banner.innerHTML = `<span style="display:flex; align-items:center; gap:8px;"><span style="flex-shrink:0; display:flex;"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span><span>${teks}</span></span><button class="rt-iconbtn" id="rtDismissReminder" style="width:28px;height:28px;flex-shrink:0;">&#10005;</button>`;
    const header = document.querySelector('.rt-header');
    header.insertAdjacentElement('afterend', banner);
    document.getElementById('rtDismissReminder').addEventListener('click', ()=>{ banner.remove(); });
  }

  async function maybeNotify(){
    if(!checkReminderDue()) return;
    const lastNotified = state.reminder.lastNotifiedAt ? new Date(state.reminder.lastNotifiedAt).getTime() : 0;
    const cooldownMs = 30 * 60000; // jangan notif ulang dalam 30 menit
    if(Date.now() - lastNotified < cooldownMs) return;
    state.reminder.lastNotifiedAt = new Date().toISOString();
    await saveReminder();
    if(typeof Notification !== 'undefined' && Notification.permission === 'granted'){
      try{
        new Notification('Resin Tracker', { body: 'Saatnya isi laporan produksi resin FibreBeam.' });
      }catch(e){}
    }
  }

  function startReminderChecker(){
    renderReminderBanner();
    maybeNotify();
    if(reminderTimer) clearInterval(reminderTimer);
    reminderTimer = setInterval(()=>{ renderReminderBanner(); maybeNotify(); }, 60000);
  }

  function fmt(n, d=2){
    if(isNaN(n) || n===null || n===undefined) return '0';
    return Number(n).toLocaleString('id-ID', {minimumFractionDigits:0, maximumFractionDigits:d});
  }
  function fmtFull(n, d=4){
    if(isNaN(n) || n===null || n===undefined) return '0';
    return Number(n).toLocaleString('id-ID', {minimumFractionDigits:d, maximumFractionDigits:d});
  }
  function escapeHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function num(v){ const n = parseFloat(String(v).replace(',','.')); return isNaN(n) ? 0 : n; }

  function computeAll(f){
    const jatah = num(f.jatahResin);

    // Carry-in dari shift sebelumnya (resin murni yang sudah ada di tangan, belum dipakai)
    const sisaCampuranAwalMurni = num(f.sisaCampuranAwal) / CONV_FACTOR * 100;
    const sisaResinMurniSebelumnya = num(f.sisaBelumDiadukAwal) + sisaCampuranAwalMurni;

    // POIN 1: resin murni yang sudah/belum diambil dari gudang, acuan jatah SPK
    const sisaBelumDiambilGudang = jatah - num(f.jumlahResinGudang);

    // POIN 2: resin murni yang sudah diaduk vs yang sudah diambil tapi belum diaduk
    const totalResinMurniTersedia = sisaResinMurniSebelumnya + num(f.jumlahResinGudang);
    const sisaBelumDiaduk = totalResinMurniTersedia - num(f.jumlahResinDiaduk);
    const jumlahResinCampuranDariDiaduk = num(f.jumlahResinDiaduk) * CONV_FACTOR / 100;

    // POIN 3: resin campuran dihasilkan dituang via ember ke diptank, lalu dipakai produksi, sisa diukur di diptank
    const jumlahDituangKeDiptank = num(f.jumlahEmber) * num(f.beratPerEmber); // aktual masuk diptank, dari hitungan ember
    const selisihTuang = jumlahResinCampuranDariDiaduk - jumlahDituangKeDiptank; // cross-check vs teori dari resin diaduk

    // Sisa resin campuran yang dihasilkan tapi belum dituang ke ember/diptank
    const sisaCampuranBelumDituang = selisihTuang;
    const sisaCampuranBelumDituangMurni = sisaCampuranBelumDituang / CONV_FACTOR * 100;

    // Sisa fisik aktual di diptank (hasil ukur akhir shift)
    const sisaDiptankAkhir = num(f.sisaDiptankAkhir);
    const jumlahResinCampuranDipakai = jumlahDituangKeDiptank - sisaDiptankAkhir; // aktual dipakai produksi
    const sisaResinCampuran = sisaDiptankAkhir;
    const sisaResinCampuranMurni = sisaResinCampuran / CONV_FACTOR * 100;

    // Resin terpakai aktual = konversi murni dari resin campuran yang benar-benar dipakai (acuan: sisa diptank)
    const resinTerpakai = jumlahResinCampuranDipakai / CONV_FACTOR * 100;

    // Total sisa resin murni saat ini (siap dibawa ke shift berikutnya) = belum diaduk + belum dituang + sisa diptank (semua konversi murni)
    const totalSisaAkhir = sisaBelumDiaduk + sisaCampuranBelumDituangMurni + sisaResinCampuranMurni;

    const selisih = resinTerpakai - jatah;
    const persenSelisih = jatah !== 0 ? (selisih / jatah * 100) : 0;
    let status = 'pas';
    if(selisih > 0.01) status = 'over'; else if(selisih < -0.01) status = 'irit';

    const sisaProduksi = num(f.jumlahMeter) - num(f.produkOK);
    const nonOK = num(f.produkAwalAkhir)+num(f.produkLebih)+num(f.produkKW)+num(f.produkNG);
    const totalProduksi = num(f.produkOK) + num(f.produkLebihan1cm) + nonOK;

    const beratVals = [f.berat1, f.berat2, f.berat3].filter(v => String(v).trim() !== '');
    const beratRata = beratVals.length > 0 ? beratVals.reduce((s,v)=>s+num(v),0) / beratVals.length : 0;
    const beratSelisih = beratRata - num(f.beratProdukSPK);

    const additives = ADDITIVES.map(a => ({...a, jumlah: Math.abs(selisih) * a.pct/100}));


    // --- Analisa lanjutan ---
    const resinPerMeter = totalProduksi > 0 ? resinTerpakai / totalProduksi : 0;
    const estimasiKebutuhanSisa = resinPerMeter * sisaProduksi;
    // Total sisa resin murni yang benar-benar masih bisa dipakai: belum diambil dari gudang + belum diaduk + sisa diptank (konversi murni)
    const sisaJatah = sisaBelumDiambilGudang + sisaBelumDiaduk + sisaCampuranBelumDituangMurni + sisaResinCampuranMurni;
    const cukupUntukSisa = sisaProduksi <= 0 ? null : (sisaJatah >= estimasiKebutuhanSisa);
    const selisihKecukupan = sisaJatah - estimasiKebutuhanSisa;

    const persenNonOK = num(f.jumlahMeter) > 0 ? (nonOK / num(f.jumlahMeter) * 100) : 0;
    const resinTerpakaiNonOK = resinPerMeter * nonOK;

    const beratPersenSelisih = num(f.beratProdukSPK) !== 0 ? (beratSelisih / num(f.beratProdukSPK) * 100) : 0;
    const selisihBeratSPKvsAktual = num(f.beratProdukSPK) - beratRata;

    // --- Narasi analisa ---
    let narasiKecukupan;
    if(sisaProduksi <= 0){
      narasiKecukupan = 'SPK sudah selesai diproduksi seluruhnya (tidak ada sisa panjang produksi).';
    } else if(totalProduksi <= 0){
      narasiKecukupan = 'Belum ada Total Produksi (OK + Lebihan 1cm + Non-OK) tercatat, sehingga rata-rata pemakaian resin per meter belum bisa dihitung.';
    } else if(cukupUntukSisa){
      narasiKecukupan = `Dengan rata-rata pemakaian ${fmt(resinPerMeter,3)} kg/m (resin terpakai &divide; total produksi OK+Lebihan 1cm+Non-OK), total sisa resin murni yang masih tersedia (belum diambil dari gudang ${fmt(sisaBelumDiambilGudang)} kg + belum diaduk ${fmt(sisaBelumDiaduk)} kg + belum dituang ke diptank dikonversi ${fmt(sisaCampuranBelumDituangMurni)} kg + sisa diptank dikonversi ${fmt(sisaResinCampuranMurni)} kg = ${fmt(sisaJatah)} kg) masih CUKUP untuk menyelesaikan sisa ${fmt(sisaProduksi)} m produksi (kebutuhan estimasi ${fmt(estimasiKebutuhanSisa)} kg, surplus ${fmt(Math.abs(selisihKecukupan))} kg).`;
    } else {
      narasiKecukupan = `Dengan rata-rata pemakaian ${fmt(resinPerMeter,3)} kg/m (resin terpakai &divide; total produksi OK+Lebihan 1cm+Non-OK), total sisa resin murni yang masih tersedia (belum diambil dari gudang ${fmt(sisaBelumDiambilGudang)} kg + belum diaduk ${fmt(sisaBelumDiaduk)} kg + belum dituang ke diptank dikonversi ${fmt(sisaCampuranBelumDituangMurni)} kg + sisa diptank dikonversi ${fmt(sisaResinCampuranMurni)} kg = ${fmt(sisaJatah)} kg) TIDAK CUKUP untuk menyelesaikan sisa ${fmt(sisaProduksi)} m produksi (kebutuhan estimasi ${fmt(estimasiKebutuhanSisa)} kg, kekurangan ${fmt(Math.abs(selisihKecukupan))} kg). Perlu tambahan resin atau evaluasi proses.`;
    }

    let narasiNonOK;
    if(nonOK <= 0){
      narasiNonOK = 'Tidak ada produk non-OK (Awal & Akhir, Lebih, KW, NG) pada SPK ini.';
    } else {
      const dominan = [
        {l:'Produk Awal & Akhir', v:num(f.produkAwalAkhir)},
        {l:'Produk Lebih', v:num(f.produkLebih)},
        {l:'Produk KW', v:num(f.produkKW)},
        {l:'Produk NG', v:num(f.produkNG)}
      ].sort((a,b)=>b.v-a.v)[0];
      const kontribusi = status==='over'
        ? `dan menjadi salah satu kemungkinan penyebab resin OVER, karena bahan yang terpakai pada produk non-OK turut mengurangi jatah resin tanpa menghasilkan produk OK yang sepadan`
        : (status==='irit' ? `namun pemakaian resin tetap IRIT, sehingga non-OK ini lebih mengarah ke faktor proses/dimensi dibanding kelebihan resin` : `pada tingkat yang masih sebanding dengan pemakaian resin yang PAS`);
      const resinNonOKTxt = totalProduksi > 0
        ? ` Berdasarkan rasio aktual pemakaian resin terhadap total produksi (${fmt(resinPerMeter,3)} kg/m, dari OK + Lebihan 1cm + Non-OK), perkiraan resin yang terpakai untuk produk non-OK ini adalah ${fmt(resinTerpakaiNonOK)} kg.`
        : ` Rasio kg/m belum bisa dihitung karena Total Produksi masih 0.`;
      narasiNonOK = `Total produk non-OK ${fmt(nonOK)} m (${fmt(persenNonOK)}% dari total ${fmt(num(f.jumlahMeter))} m), didominasi oleh ${dominan.l} (${fmt(dominan.v)} m), ${kontribusi}.${resinNonOKTxt}`;
    }

    let narasiBerat;
    if(num(f.beratProdukSPK) <= 0 || (!f.berat1 && !f.berat2 && !f.berat3)){
      narasiBerat = 'Data berat SPK atau berat aktual belum lengkap untuk dianalisa.';
    } else if(Math.abs(beratPersenSelisih) < 1){
      narasiBerat = `Berat SPK ${fmtFull(num(f.beratProdukSPK))} kg &minus; berat rata-rata aktual ${fmtFull(beratRata)} kg = selisih ${fmtFull(selisihBeratSPKvsAktual)} kg (${fmt(Math.abs(beratPersenSelisih),2)}%). Sudah sesuai standar SPK.`;
    } else if(selisihBeratSPKvsAktual < 0){
      narasiBerat = `Berat SPK ${fmtFull(num(f.beratProdukSPK))} kg &minus; berat rata-rata aktual ${fmtFull(beratRata)} kg = selisih ${fmtFull(selisihBeratSPKvsAktual)} kg. Artinya berat aktual LEBIH BERAT ${fmtFull(Math.abs(selisihBeratSPKvsAktual))} kg (${fmt(Math.abs(beratPersenSelisih),2)}%) dari standar SPK${status==='over' ? ', sejalan dan turut menjelaskan resin OVER karena setiap produk menyerap lebih banyak resin dari standar.' : '.'}`;
    } else {
      narasiBerat = `Berat SPK ${fmtFull(num(f.beratProdukSPK))} kg &minus; berat rata-rata aktual ${fmtFull(beratRata)} kg = selisih ${fmtFull(selisihBeratSPKvsAktual)} kg. Artinya berat aktual LEBIH RINGAN ${fmtFull(Math.abs(selisihBeratSPKvsAktual))} kg (${fmt(Math.abs(beratPersenSelisih),2)}%) dari standar SPK${status==='irit' ? ', sejalan dan turut menjelaskan resin IRIT karena setiap produk menyerap resin lebih sedikit dari standar.' : '.'}`;
    }

    return {
      sisaCampuranAwalMurni, sisaResinMurniSebelumnya,
      sisaBelumDiambilGudang, totalResinMurniTersedia, sisaBelumDiaduk,
      jumlahResinCampuranDariDiaduk, jumlahResinCampuranDipakai, jumlahDituangKeDiptank, selisihTuang,
      sisaCampuranBelumDituang, sisaCampuranBelumDituangMurni,
      sisaDiptankAkhir, sisaResinCampuran, sisaResinCampuranMurni,
      totalSisaAkhir, resinTerpakai, jatah, selisih, persenSelisih, status,
      sisaProduksi, nonOK, totalProduksi, beratRata, beratSelisih, additives,
      resinPerMeter, estimasiKebutuhanSisa, sisaJatah, cukupUntukSisa, selisihKecukupan,
      persenNonOK, resinTerpakaiNonOK, beratPersenSelisih, selisihBeratSPKvsAktual, narasiKecukupan, narasiNonOK, narasiBerat
    };
  }

  function badgeHtml(status, selisih){
    if(status==='over') return `<span class="rt-badge over">▲ OVER ${fmt(Math.abs(selisih))} kg</span>`;
    if(status==='irit') return `<span class="rt-badge irit">▼ IRIT ${fmt(Math.abs(selisih))} kg</span>`;
    return `<span class="rt-badge pas">● PAS</span>`;
  }

  function renderForm(){
    const c = computeAll(form);
    const productOptions = PRODUCTS.map(p=>`<option value="${p}" ${form.namaProdukSelect===p?'selected':''}>${p}</option>`).join('');

    body.dataset.rendered = 'form';
    body.innerHTML = `
      ${state.editingId ? `
      <div class="rt-card" style="background:rgba(14,124,114,0.08); border-color:var(--accent); display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <span style="font-size:13px; font-weight:600; display:flex; align-items:center; gap:7px;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; "><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Sedang mengedit laporan tersimpan</span>
        <button class="rt-btn rt-btn-ghost rt-no-print" id="rtCancelEdit" style="padding:7px 12px;">Batal Edit</button>
      </div>` : ''}
      <div class="rt-card">
        <h2><span class="rt-step-no">1</span> Data SPK</h2>
        <p class="rt-sub">Satu kali pengecekan untuk satu No. SPK.</p>
        <div class="rt-grid">
          <div class="rt-field"><label>No. SPK</label><input id="f_noSPK" value="${form.noSPK}" placeholder="SPK-2026-001" style="text-transform:uppercase;" autocapitalize="characters" autocomplete="off" spellcheck="false"></div>
          <div class="rt-field"><label>Tanggal</label><input id="f_tanggal" type="date" value="${form.tanggal}"></div>
          <div class="rt-field">
            <label>Nama Produk</label>
            <select id="f_namaProdukSelect">
              ${productOptions}
              <option value="__manual__" ${form.useManual?'selected':''}>+ Input manual...</option>
            </select>
          </div>
          ${form.useManual ? `<div class="rt-field"><label>Nama Produk (Manual)</label><input id="f_namaProdukManual" value="${form.namaProdukManual}" placeholder="Nama produk lain"></div>` : ''}
          <div class="rt-field"><label>Jumlah Meter</label><input id="f_jumlahMeter" type="text" inputmode="decimal" value="${form.jumlahMeter}" placeholder="0"></div>
          <div class="rt-field"><label>Jatah Resin (kg)</label><input id="f_jatahResin" type="text" inputmode="decimal" value="${form.jatahResin}" placeholder="0"></div>
          <div class="rt-field"><label>Berat Produk SPK (kg/pcs)</label><input id="f_beratProdukSPK" type="text" inputmode="decimal" value="${form.beratProdukSPK}" placeholder="0"></div>
          <div class="rt-field"><label>Leader</label><input id="f_leader" value="${form.leader}" placeholder="Nama leader"></div>
          <div class="rt-field">
            <label>Shift</label>
            <select id="f_shift">
              <option value="1" ${form.shift==='1'?'selected':''}>Shift 1</option>
              <option value="2" ${form.shift==='2'?'selected':''}>Shift 2</option>
              <option value="3" ${form.shift==='3'?'selected':''}>Shift 3</option>
            </select>
          </div>
        </div>
      </div>

      <div class="rt-card">
        <h2><span class="rt-step-no">2</span> Alur Resin</h2>
        <p class="rt-sub">Resin murni dari gudang &rarr; diaduk jadi resin campuran &rarr; dipakai produksi. Semua sisa dihitung otomatis.</p>

        <div class="rt-grid">
          <div class="rt-field"><label>Sisa Resin Belum Diaduk (carry-in shift sebelumnya, kg)</label><input id="f_sisaBelumDiadukAwal" type="text" inputmode="decimal" value="${form.sisaBelumDiadukAwal}" placeholder="0"></div>
          <div class="rt-field"><label>Sisa Resin dalam Campuran (carry-in shift sebelumnya, kg)</label><input id="f_sisaCampuranAwal" type="text" inputmode="decimal" value="${form.sisaCampuranAwal}" placeholder="0">
            <span class="rt-hint">Dikonversi otomatis &divide; ${CONV_FACTOR} &times; 100</span>
          </div>
        </div>
        <div class="rt-flowcalc">
          <div><span class="l">Konversi ke murni</span><span class="v" id="o_sisaCampuranAwalMurni">${fmt(c.sisaCampuranAwalMurni)} kg</span></div>
          <div><span class="l">Total Carry-in Resin Murni</span><span class="v" id="o_sisaResinMurniSebelumnya">${fmt(c.sisaResinMurniSebelumnya)} kg</span></div>
        </div>

        <div class="rt-divider"></div>

        <p class="rt-sub" style="margin-bottom:8px;"><b>1) Pengambilan dari Gudang</b> &mdash; acuan Jatah Resin SPK</p>
        <div class="rt-grid">
          <div class="rt-field"><label>Diambil dari Gudang (Resin Murni, kg)</label><input id="f_jumlahResinGudang" type="text" inputmode="decimal" value="${form.jumlahResinGudang}" placeholder="0"></div>
          <div class="rt-field"><label>Sisa Belum Diambil dari Gudang (otomatis, kg)</label><input id="f_sisaBelumDiambilGudang" type="text" value="${fmt(c.sisaBelumDiambilGudang)}" readonly>
            <span class="rt-hint">Otomatis = Jatah Resin &minus; Diambil dari Gudang</span>
          </div>
        </div>

        <div class="rt-divider"></div>

        <p class="rt-sub" style="margin-bottom:8px;"><b>2) Pengadukan</b> &mdash; dari resin murni yang sudah diambil (+ carry-in)</p>
        <div class="rt-grid">
          <div class="rt-field"><label>Jumlah Resin Diaduk (Resin Murni, kg)</label><input id="f_jumlahResinDiaduk" type="text" inputmode="decimal" value="${form.jumlahResinDiaduk}" placeholder="0"></div>
          <div class="rt-field"><label>Jumlah Resin Campuran Dihasilkan (otomatis, kg)</label><input id="f_jumlahResinCampuranDariDiaduk" type="text" value="${fmt(c.jumlahResinCampuranDariDiaduk)}" readonly>
            <span class="rt-hint">Otomatis = Resin Diaduk &times; ${CONV_FACTOR} &divide; 100</span>
          </div>
        </div>
        <div class="rt-flowcalc">
          <div><span class="l">Total Resin Murni Tersedia (carry-in + gudang)</span><span class="v" id="o_totalResinMurniTersedia">${fmt(c.totalResinMurniTersedia)} kg</span></div>
          <div><span class="l">Sisa Belum Diaduk (otomatis)</span><span class="v" id="o_sisaBelumDiaduk">${fmt(c.sisaBelumDiaduk)} kg</span></div>
        </div>

        <div class="rt-divider"></div>

        <p class="rt-sub" style="margin-bottom:8px;"><b>3) Penuangan ke Diptank</b> &mdash; Resin Campuran Dihasilkan dituang via ember ke diptank</p>
        <div class="rt-grid rt-grid-3">
          <div class="rt-field"><label>Jumlah Ember Dituang ke Diptank</label><input id="f_jumlahEmber" type="text" inputmode="decimal" value="${form.jumlahEmber}" placeholder="0"></div>
          <div class="rt-field"><label>Berat per Ember (kg)</label><input id="f_beratPerEmber" type="text" inputmode="decimal" value="${form.beratPerEmber}" placeholder="20,396"></div>
          <div class="rt-field"><label>Jumlah Dituang ke Diptank (otomatis, kg)</label><input id="f_jumlahDituangKeDiptank" type="text" value="${fmt(c.jumlahDituangKeDiptank)}" readonly>
            <span class="rt-hint">Otomatis = Jumlah Ember &times; Berat per Ember</span>
          </div>
        </div>
        <div class="rt-flowcalc">
          <div><span class="l">Resin Campuran Dihasilkan (dari diaduk)</span><span class="v" id="o_jumlahResinCampuranDariDiaduk2">${fmt(c.jumlahResinCampuranDariDiaduk)} kg</span></div>
          <div><span class="l">Sisa Belum Dituang ke Diptank</span><span class="v" id="o_selisihTuang" style="color:${Math.abs(c.selisihTuang)>0.5?'var(--warn)':'var(--ok)'}">${c.selisihTuang>0?'+':''}${fmt(c.selisihTuang)} kg</span></div>
          <div><span class="l">Konversi ke Resin Murni</span><span class="v" id="o_sisaCampuranBelumDituangMurni">${fmt(c.sisaCampuranBelumDituangMurni)} kg</span></div>
        </div>

        <div class="rt-divider"></div>

        <p class="rt-sub" style="margin-bottom:8px;"><b>4) Sisa di Diptank</b> &mdash; resin campuran dipakai produksi langsung dari diptank, sisanya diukur di akhir shift</p>
        <div class="rt-grid">
          <div class="rt-field"><label>Sisa Resin Campuran di Diptank (akhir shift, kg)</label><input id="f_sisaDiptankAkhir" type="text" inputmode="decimal" value="${form.sisaDiptankAkhir}" placeholder="0"></div>
          <div class="rt-field"><label>Resin Campuran Dipakai (otomatis, kg)</label><input id="f_jumlahResinCampuranDipakai" type="text" value="${fmt(c.jumlahResinCampuranDipakai)}" readonly>
            <span class="rt-hint">Otomatis = Dituang ke Diptank &minus; Sisa di Diptank</span>
          </div>
        </div>
        <div class="rt-flowcalc">
          <div><span class="l">Konversi Sisa Diptank ke Resin Murni</span><span class="v" id="o_sisaResinCampuranMurni">${fmt(c.sisaResinCampuranMurni)} kg</span></div>
        </div>

        <div class="rt-divider"></div>

        <div class="rt-flowcalc">
          <div><span class="l">Total Sisa Resin Murni (belum diaduk + belum dituang + sisa diptank)</span><span class="v" id="o_totalSisaAkhir">${fmt(c.totalSisaAkhir)} kg</span></div>
          <div><span class="l">Resin Terpakai (aktual, dari sisa diptank)</span><span class="v" id="o_resinTerpakai" style="color:var(--accent)">${fmt(c.resinTerpakai)} kg</span></div>
        </div>
      </div>

      <div class="rt-card">
        <h2><span class="rt-step-no">3</span> Hasil Produksi</h2>
        <p class="rt-sub">Selain Produk OK dijadikan analisa sebab resin over. Lebihan 1cm adalah toleransi per batang, tidak mengurangi OK dan tidak masuk non-OK.</p>
        <div class="rt-grid rt-grid-3">
          <div class="rt-field"><label>Produk OK (m)</label><input id="f_produkOK" type="text" inputmode="decimal" value="${form.produkOK}" placeholder="0"></div>
          <div class="rt-field"><label>Lebihan 1cm (m, toleransi)</label><input id="f_produkLebihan1cm" type="text" inputmode="decimal" value="${form.produkLebihan1cm}" placeholder="0"></div>
          <div class="rt-field"><label>Produk Awal &amp; Akhir (m)</label><input id="f_produkAwalAkhir" type="text" inputmode="decimal" value="${form.produkAwalAkhir}" placeholder="0"></div>
          <div class="rt-field"><label>Produk Lebih (m)</label><input id="f_produkLebih" type="text" inputmode="decimal" value="${form.produkLebih}" placeholder="0"></div>
          <div class="rt-field"><label>Produk KW (m)</label><input id="f_produkKW" type="text" inputmode="decimal" value="${form.produkKW}" placeholder="0"></div>
          <div class="rt-field"><label>Produk NG (m)</label><input id="f_produkNG" type="text" inputmode="decimal" value="${form.produkNG}" placeholder="0"></div>
        </div>
        <div class="rt-flowcalc">
          <div><span class="l">Sisa Produksi (meter &minus; OK)</span><span class="v" id="o_sisaProduksi">${fmt(c.sisaProduksi)} m</span></div>
          <div><span class="l">Total Non-OK (analisa over)</span><span class="v" id="o_nonOK" style="color:var(--warn)">${fmt(c.nonOK)} m</span></div>
          <div><span class="l">Total Produksi (OK + Lebihan 1cm + Non-OK)</span><span class="v" id="o_totalProduksi">${fmt(c.totalProduksi)} m</span></div>
        </div>
      </div>

      <div class="rt-card">

  function bindFormEvents(){
    const ids = ['tanggal','jumlahMeter','jatahResin','beratProdukSPK','leader',
      'sisaBelumDiadukAwal','sisaCampuranAwal','jumlahResinGudang','jumlahResinDiaduk',
      'jumlahEmber','beratPerEmber','sisaDiptankAkhir','produkOK','produkLebihan1cm','produkAwalAkhir','produkLebih','produkKW','produkNG',
      'berat1','berat2','berat3','namaProdukManual'];
    ids.forEach(id=>{
      const el = document.getElementById('f_'+id);
      if(el) el.addEventListener('input', (e)=>{ form[id] = e.target.value; refreshComputed(); });
    });
    const noSpkEl = document.getElementById('f_noSPK');
    if(noSpkEl) noSpkEl.addEventListener('input', (e)=>{
      const pos = e.target.selectionStart;
      const upper = e.target.value.toUpperCase();
      e.target.value = upper;
      form.noSPK = upper;
      try{ e.target.setSelectionRange(pos, pos); }catch(err){}
      refreshComputed();
    });
    const shiftEl = document.getElementById('f_shift');
    if(shiftEl) shiftEl.addEventListener('change', e=>{ form.shift = e.target.value; });
    const prodEl = document.getElementById('f_namaProdukSelect');
    if(prodEl) prodEl.addEventListener('change', e=>{
      if(e.target.value === '__manual__'){ form.useManual = true; }
      else { form.useManual = false; form.namaProdukSelect = e.target.value; }
      renderForm();
    });
    document.getElementById('rtSaveBtn').addEventListener('click', saveRecord);
    document.getElementById('rtResetBtn').addEventListener('click', ()=>{
      if(confirm('Reset semua isian form ini?')){ form = blankForm(); state.editingId = null; renderForm(); }
    });
    const cancelEditBtn = document.getElementById('rtCancelEdit');
    if(cancelEditBtn) cancelEditBtn.addEventListener('click', ()=>{
      form = blankForm(); state.editingId = null; renderForm();
    });
  }

  async function saveRecord(){
    const noSPK = form.noSPK.trim().toUpperCase();
    form.noSPK = noSPK;
    if(!noSPK){ alert('No. SPK wajib diisi.'); return; }
    const c = computeAll(form);
    const namaProduk = form.useManual ? (form.namaProdukManual.trim() || 'Produk Manual') : form.namaProdukSelect;

    if(state.editingId){
      const idx = state.records.findIndex(x=>x.id === state.editingId);
      if(idx !== -1){
        state.records[idx] = {
          ...state.records[idx],
          form: {...form, namaProdukFinal: namaProduk},
          calc: c,
          updatedAt: new Date().toISOString()
        };
      }
      state.editingId = null;
    } else {
      const record = {
        id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
        savedAt: new Date().toISOString(),
        form: {...form, namaProdukFinal: namaProduk},
        calc: c
      };
      state.records.unshift(record);
    }
    await saveRecords();
    form = blankForm();
    state.tab = 'history';
    render();
    renderReminderBanner();
  }

  function computeCombinedData(ids){
    const selected = state.records.filter(r => ids.includes(r.id));
    if(selected.length < 2) return null;
    const sorted = [...selected].sort((a,b)=>{
      if(a.form.tanggal !== b.form.tanggal) return a.form.tanggal < b.form.tanggal ? -1 : 1;
      return num(a.form.shift) - num(b.form.shift);
    });
    const rows = sorted.map(r => ({ r, c: computeAll(r.form) }));

    const totalJatah = rows.reduce((s,x)=>s+x.c.jatah, 0);
    const totalTerpakai = rows.reduce((s,x)=>s+x.c.resinTerpakai, 0);
    const totalSelisih = totalTerpakai - totalJatah;
    let statusGabungan = 'pas';
    if(totalSelisih > 0.01) statusGabungan = 'over'; else if(totalSelisih < -0.01) statusGabungan = 'irit';

    const totalMeterTarget = rows.reduce((s,x)=>s+num(x.r.form.jumlahMeter), 0);
    const totalOK = rows.reduce((s,x)=>s+num(x.r.form.produkOK), 0);
    const totalLebihan = rows.reduce((s,x)=>s+num(x.r.form.produkLebihan1cm), 0);
    const totalNonOK = rows.reduce((s,x)=>s+x.c.nonOK, 0);
    const totalProduksi = rows.reduce((s,x)=>s+x.c.totalProduksi, 0);
    const totalSisaProduksi = rows.reduce((s,x)=>s+x.c.sisaProduksi, 0);

    const additivesGabungan = ADDITIVES.map(a => ({...a, jumlah: Math.abs(totalSelisih) * a.pct/100}));

    const spkSet = [...new Set(sorted.map(x=>x.form.noSPK))];
    const tanggalSet = [...new Set(sorted.map(x=>x.form.tanggal))];
    const shiftLabel = sorted.map(x=>x.form.shift).join(' + ');

    // --- kelompokkan per No. SPK + Tanggal, di dalamnya diurutkan per shift ---
    const groupMap = new Map();
    rows.forEach(x=>{
      const key = `${x.r.form.noSPK}||${x.r.form.tanggal}`;
      if(!groupMap.has(key)) groupMap.set(key, { noSPK: x.r.form.noSPK, tanggal: x.r.form.tanggal, items: [] });
      groupMap.get(key).items.push(x);
    });
    const groups = [...groupMap.values()].sort((a,b)=>{
      if(a.tanggal !== b.tanggal) return a.tanggal < b.tanggal ? -1 : 1;
      return a.noSPK.localeCompare(b.noSPK, 'id', {numeric:true});
    });
    groups.forEach(g=>{
      g.items.sort((a,b)=>num(a.r.form.shift) - num(b.r.form.shift));
      g.subJatah = g.items.reduce((s,x)=>s+x.c.jatah,0);
      g.subTerpakai = g.items.reduce((s,x)=>s+x.c.resinTerpakai,0);
      g.subSelisih = g.subTerpakai - g.subJatah;
      g.subStatus = g.subSelisih > 0.01 ? 'over' : (g.subSelisih < -0.01 ? 'irit' : 'pas');
      g.subMeterTarget = g.items.reduce((s,x)=>s+num(x.r.form.jumlahMeter),0);
      g.subOK = g.items.reduce((s,x)=>s+num(x.r.form.produkOK),0);
      g.subNonOK = g.items.reduce((s,x)=>s+x.c.nonOK,0);
      g.subSisaProduksi = g.items.reduce((s,x)=>s+x.c.sisaProduksi,0);
      const shiftsAda = g.items.map(x=>x.r.form.shift);
      g.shiftsMissing = ['1','2','3'].filter(s=>!shiftsAda.includes(s));
    });

    return {
      rows, groups, totalJatah, totalTerpakai, totalSelisih, statusGabungan,
      totalMeterTarget, totalOK, totalLebihan, totalNonOK, totalProduksi, totalSisaProduksi,
      additivesGabungan, spkSet, tanggalSet, shiftLabel
    };
  }

  // ---------- Rekap per SPK ----------
  function computeRekapSpkGroups(){
    const groupMap = new Map();
    state.records.forEach(r=>{
      const key = r.form.noSPK || '(tanpa SPK)';
      if(!groupMap.has(key)) groupMap.set(key, []);
      groupMap.get(key).push(r);
    });

    const groups = [...groupMap.entries()].map(([noSPK, records])=>{
      const rows = records
        .map(r=>({ r, c: r.calc || computeAll(r.form) }))
        .sort((a,b)=>{
          if(a.r.form.tanggal !== b.r.form.tanggal) return a.r.form.tanggal < b.r.form.tanggal ? -1 : 1;
          return num(a.r.form.shift) - num(b.r.form.shift);
        });
      const totalJatah = rows.reduce((s,x)=>s+x.c.jatah, 0);
      const totalTerpakai = rows.reduce((s,x)=>s+x.c.resinTerpakai, 0);
      const totalSelisih = totalTerpakai - totalJatah;
      const status = totalSelisih > 0.01 ? 'over' : (totalSelisih < -0.01 ? 'irit' : 'pas');
      const totalMeterTarget = rows.reduce((s,x)=>s+num(x.r.form.jumlahMeter), 0);
      const totalOK = rows.reduce((s,x)=>s+num(x.r.form.produkOK), 0);
      const totalLebihan = rows.reduce((s,x)=>s+num(x.r.form.produkLebihan1cm), 0);
      const totalNonOK = rows.reduce((s,x)=>s+x.c.nonOK, 0);
      const totalSisaProduksi = rows.reduce((s,x)=>s+x.c.sisaProduksi, 0);
      const tanggalSet = [...new Set(rows.map(x=>x.r.form.tanggal))].sort();
      const produkSet = [...new Set(rows.map(x=>x.r.form.namaProdukFinal).filter(Boolean))];
      return {
        noSPK, rows, totalJatah, totalTerpakai, totalSelisih, status,
        totalMeterTarget, totalOK, totalLebihan, totalNonOK, totalSisaProduksi,
        tanggalSet, produk: produkSet.join(', ') || '-'
      };
    }).sort((a,b)=>a.noSPK.localeCompare(b.noSPK, 'id', {numeric:true}));

    return groups;
  }

  // ---------- Grafik Over/Irit per Leader ----------
  function computeLeaderStats(records){
    const map = new Map();
    (records || state.records).forEach(r=>{
      const leader = (r.form.leader || '').trim() || 'Tanpa Nama';
      const c = r.calc || computeAll(r.form);
      if(!map.has(leader)) map.set(leader, { leader, totalJatah:0, totalTerpakai:0, count:0, overCount:0, iritCount:0, pasCount:0 });
      const s = map.get(leader);
      s.totalJatah += c.jatah;
      s.totalTerpakai += c.resinTerpakai;
      s.count += 1;
      if(c.status==='over') s.overCount++;
      else if(c.status==='irit') s.iritCount++;
      else s.pasCount++;
    });
    const arr = [...map.values()].map(s=>{
      const selisih = s.totalTerpakai - s.totalJatah;
      const status = selisih > 0.01 ? 'over' : (selisih < -0.01 ? 'irit' : 'pas');
      return { ...s, selisih, status };
    });
    arr.sort((a,b)=> b.selisih - a.selisih);
    return arr;
  }

  function buildLeaderChartSvg(stats){
    if(stats.length === 0){
      return `<p class="rt-sub" style="margin:0;">Belum ada data leader untuk ditampilkan.</p>`;
    }
    const rowH = 34;
    const leftW = 104;    // kolom nama leader (rata kanan, berakhir di leftW-8)
    const sidePad = 70;   // kolom khusus label angka, di kiri (irit) & kanan (over) area bar
    const chartW = 260;   // area bar (dipusatkan pada centerX)
    const topPad = 14;
    const totalW = leftW + sidePad + chartW + sidePad;
    const totalH = topPad*2 + stats.length*rowH;
    const maxAbs = Math.max(1, ...stats.map(s=>Math.abs(s.selisih)));
    const halfChart = chartW/2 - 8;
    const scale = halfChart / maxAbs;
    const chartStartX = leftW + sidePad;
    const centerX = chartStartX + chartW/2;

    const rows = stats.map((s,i)=>{
      const y = topPad + i*rowH;
      const barY = y + 6;
      const barH = rowH - 15;
      const isOver = s.status === 'over';
      const isIrit = s.status === 'irit';
      const color = isOver ? 'var(--danger)' : (isIrit ? 'var(--ok)' : 'var(--text-dim)');
      const rawW = Math.abs(s.selisih) * scale;
      const barW = (isOver || isIrit) ? Math.max(2, rawW) : 3;
      const barX = isOver ? centerX : (isIrit ? centerX - barW : centerX - barW/2);
      const labelX = isOver ? (barX + barW + 6) : (isIrit ? (barX - 6) : (centerX + 8));
      const anchor = isIrit ? 'end' : 'start';
      const valueText = `${s.selisih>0?'+':''}${fmt(s.selisih)} kg`;
      const title = `${escapeHtml(s.leader)}: ${valueText} dari ${s.count} laporan (${s.overCount} over, ${s.iritCount} irit, ${s.pasCount} pas)`;
      return `<g>
        <title>${title}</title>
        <text x="${leftW-8}" y="${y+rowH/2+4}" text-anchor="end" font-size="11.5" font-family="Inter,sans-serif" fill="var(--text)">${escapeHtml(s.leader)}</text>
        <rect x="${barX}" y="${barY}" width="${barW}" height="${barH}" rx="3" fill="${color}"></rect>
        <text x="${labelX}" y="${y+rowH/2+4}" text-anchor="${anchor}" font-size="10.5" font-family="'JetBrains Mono',monospace" fill="${color}" font-weight="600">${valueText}</text>
      </g>`;
    }).join('');

    return `<svg viewBox="0 0 ${totalW} ${totalH}" width="100%" height="${totalH}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${centerX}" y1="0" x2="${centerX}" y2="${totalH}" stroke="var(--line)" stroke-width="1"/>
      ${rows}
    </svg>`;
  }

  function renderLeaderChartCard(records, spkLabel){
    const stats = computeLeaderStats(records);
    const svg = buildLeaderChartSvg(stats);

  function exportRekapSpkToExcel(groups){
    if(!groups || groups.length === 0){ alert('Tidak ada data untuk diexport.'); return; }
    const statusLabel = (s)=> s==='over' ? 'OVER' : (s==='irit' ? 'IRIT' : 'PAS');

    const summaryAoa = [
      ['No. SPK', 'Produk', 'Jumlah Laporan', 'Tanggal Awal', 'Tanggal Akhir', 'Meter Target (m)', 'OK (m)', 'Non-OK (m)', 'Sisa Produksi (m)', 'Resin Terpakai (kg)', 'Jatah Resin (kg)', 'Selisih (kg)', 'Status']
    ];
    groups.forEach(g=>{
      summaryAoa.push([
        g.noSPK, g.produk, g.rows.length, g.tanggalSet[0], g.tanggalSet[g.tanggalSet.length-1],
        Number(g.totalMeterTarget.toFixed(2)), Number(g.totalOK.toFixed(2)), Number(g.totalNonOK.toFixed(2)), Number(g.totalSisaProduksi.toFixed(2)),
        Number(g.totalTerpakai.toFixed(3)), Number(g.totalJatah.toFixed(3)), Number(g.totalSelisih.toFixed(3)), statusLabel(g.status)
      ]);
    });

    const wb = XLSX.utils.book_new();
    const wsSummary = XLSX.utils.aoa_to_sheet(summaryAoa);
    wsSummary['!cols'] = [{wch:16},{wch:20},{wch:14},{wch:12},{wch:12},{wch:14},{wch:9},{wch:11},{wch:14},{wch:16},{wch:14},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Rekap per SPK');
    XLSX.writeFile(wb, `Rekap_per_SPK_${groups.length}spk.xlsx`);
  }

  function buildRecordPdfBlob(r){
    const f = r.form, c = computeAll(r.form);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'pt', format:'a4' });
    const marginX = 40;
    let y = 50;
    const lineH = 16;

    doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Resin Tracker - Laporan Produksi FibreBeam', marginX, y); y += 22;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    doc.text(`No. SPK: ${f.noSPK}    Produk: ${f.namaProdukFinal}`, marginX, y); y += lineH;
    doc.text(`Tanggal: ${f.tanggal}    Shift: ${f.shift}    Leader: ${f.leader || '-'}`, marginX, y); y += lineH+6;

    function section(title){
      doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.text(title, marginX, y); y += lineH;
      doc.setFont('helvetica','normal'); doc.setFontSize(10);
    }
    function row(label, value){
      doc.text(`${label}: ${value}`, marginX, y); y += lineH-2;
    }

    section('Status Resin');
    row('Resin Terpakai (aktual)', `${fmt(c.resinTerpakai)} kg`);
    row('Jatah Resin SPK', `${fmt(c.jatah)} kg`);
    row('Status', `${c.status==='over'?'OVER':c.status==='irit'?'IRIT':'PAS'} (selisih ${fmt(c.selisih)} kg / ${fmt(c.persenSelisih)}%)`);
    y += 6;

    section('Alur Resin');
    row('Diambil dari gudang', `${fmt(num(f.jumlahResinGudang))} kg`);
    row('Sisa belum diambil dari gudang', `${fmt(c.sisaBelumDiambilGudang)} kg`);
    row('Resin diaduk', `${fmt(num(f.jumlahResinDiaduk))} kg`);
    row('Sisa belum diaduk', `${fmt(c.sisaBelumDiaduk)} kg`);
    row('Sisa belum dituang ke diptank (konversi murni)', `${fmt(c.sisaCampuranBelumDituangMurni)} kg`);
    row('Sisa resin campuran di diptank', `${fmt(c.sisaDiptankAkhir)} kg`);
    row('Total sisa resin murni', `${fmt(c.totalSisaAkhir)} kg`);
    y += 6;

    section('Hasil Produksi');
    row('Produk OK', `${fmt(num(f.jumlahMeter))} m target, ${fmt(num(f.produkOK))} m OK`);
    row('Lebihan 1cm', `${fmt(num(f.produkLebihan1cm))} m`);
    row('Total Non-OK', `${fmt(c.nonOK)} m`);
    row('Sisa Produksi', `${fmt(c.sisaProduksi)} m`);
    y += 6;

    section('Kebutuhan Bahan Lain (% terhadap selisih over/irit)');
    c.additives.forEach(a=>row(a.name, `${a.pct}% = ${fmt(a.jumlah)} kg`));
    y += 6;

    section('Analisa Lanjutan');
    doc.setFontSize(9.5);
    [c.narasiKecukupan, c.narasiNonOK, c.narasiBerat].forEach(txt=>{
      const lines = doc.splitTextToSize(txt.replace(/&minus;/g,'-').replace(/&rarr;/g,'->'), 515);
      lines.forEach(l=>{ doc.text(l, marginX, y); y += 13; });
      y += 4;
    });

    return doc.output('blob');
  }

  async function shareRecordToWhatsApp(r){
    try{
      const blob = buildRecordPdfBlob(r);
      const fileName = `Laporan_${r.form.noSPK || 'SPK'}.pdf`;
      const file = new File([blob], fileName, { type: 'application/pdf' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        await navigator.share({
          files: [file],
          title: `Laporan ${r.form.noSPK}`,
          text: `Laporan produksi resin ${r.form.noSPK} - ${r.form.namaProdukFinal}`
        });
        return;
      }
      // Fallback: unduh PDF lalu buka WhatsApp dengan teks ringkasan (tanpa lampiran otomatis)
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
      const c = computeAll(r.form);
      const teks = encodeURIComponent(`Laporan Resin Tracker\nSPK: ${r.form.noSPK}\nProduk: ${r.form.namaProdukFinal}\nStatus: ${c.status.toUpperCase()} (${fmt(c.selisih)} kg)\n\n(PDF laporan sudah diunduh, silakan lampirkan manual ke chat WhatsApp)`);
      window.open(`https://wa.me/?text=${teks}`, '_blank');
    }catch(e){
      console.error('Gagal share ke WhatsApp', e);
      alert('Gagal membuat/membagikan PDF. Coba lagi atau gunakan tombol Export PDF di detail laporan.');
    }
  }

    document.getElementById('rtDeleteRecord').addEventListener('click', async ()=>{
      if(confirm('Hapus laporan ini? Tindakan ini tidak bisa dibatalkan.')){
        state.records = state.records.filter(x=>x.id !== r.id);
        await saveRecords();
        modal.remove();
        state.viewingId = null;
        renderHistory();
      }
    });
  }

  function render(){
    document.getElementById('rtTabForm').classList.toggle('active', state.tab==='form');
    document.getElementById('rtTabHistory').classList.toggle('active', state.tab==='history');
    document.getElementById('rtTabRekapSpk').classList.toggle('active', state.tab==='rekapSpk');
    document.getElementById('rtTabConverter').classList.toggle('active', state.tab==='converter');
    if(state.tab === 'form') renderForm();
    else if(state.tab === 'history') renderHistory();
    else if(state.tab === 'rekapSpk') renderRekapSpk();
    else renderConverter();
  }

  function updateAvatarButton(){
    const btn = document.getElementById('rtAvatarBtn');
    if(!btn) return;
    btn.innerHTML = state.profile.photoDataUrl
      ? `<img src="${state.profile.photoDataUrl}" alt="Foto profil" style="width:100%;height:100%;object-fit:cover;">`
      : `<svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>`;
  }

  function renderProfileDropdown(){
    const dd = document.getElementById('rtProfileDropdown');
    const notifSupported = typeof Notification !== 'undefined';
    const notifPerm = notifSupported ? Notification.permission : 'unsupported';
    dd.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <h2 style="margin:0; font-size:14px; font-family:'Space Grotesk',sans-serif;">Profil</h2>
        <button class="rt-iconbtn" id="rtCloseProfileDropdown" style="width:26px;height:26px;font-size:12px;">✕</button>
      </div>
      <div class="rt-avatar-row" style="margin-bottom:14px;">
        <div class="rt-avatar" id="rtAvatarPreview" style="width:60px;height:60px;font-size:24px;">
          ${state.profile.photoDataUrl ? `<img src="${state.profile.photoDataUrl}" alt="Foto profil">` : `<svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>`}
        </div>
        <div>
          <label class="rt-upload-label" style="font-size:11.5px; padding:6px 10px;">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:5px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>${state.profile.photoDataUrl ? 'Ganti Foto' : 'Unggah Foto'}
            <input type="file" id="rtPhotoInput" accept="image/*">
          </label>
          ${state.profile.photoDataUrl ? '<button class="rt-btn rt-btn-ghost" id="rtRemovePhoto" style="margin-top:6px; padding:6px 10px; font-size:11.5px;">Hapus</button>' : ''}
        </div>
      </div>
      <div class="rt-field" style="margin-bottom:14px;">
        <label>Nama Leader</label>
        <input id="f_profileName" type="text" value="${state.profile.name}" placeholder="Nama lengkap leader">
      </div>
      <p class="rt-sub" style="margin-bottom:14px;">Otomatis mengisi kolom Leader saat membuat laporan baru.</p>
      <button class="rt-btn rt-btn-primary" id="rtSaveProfile" style="width:100%; justify-content:center; margin-bottom:18px;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:5px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Simpan Profil</button>

      <div class="rt-divider"></div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin:14px 0;">
        <span style="font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Mode Gelap
        </span>
        <label class="rt-switch">
          <input type="checkbox" id="rtThemeToggle" ${state.theme === 'dark' ? 'checked' : ''}>
          <span class="rt-switch-slider"></span>
        </label>
      </div>

      <div class="rt-divider"></div>
      <p style="font-size:11.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; margin:14px 0 10px; display:flex; align-items:center; gap:7px;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Pengingat Isi Laporan
      </p>
      <div class="rt-field" style="margin-bottom:12px;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="rtReminderEnabled" ${state.reminder.enabled ? 'checked' : ''} style="width:16px;height:16px;">
          <span style="text-transform:none; font-size:13px; font-weight:600; color:var(--text);">Aktifkan pengingat</span>
        </label>
      </div>
      <div class="rt-field" style="margin-bottom:12px;">
        <label>Ingatkan setiap berapa jam</label>
        <select id="rtReminderInterval">
          <option value="4" ${state.reminder.intervalHours===4?'selected':''}>Setiap 4 jam</option>
          <option value="8" ${state.reminder.intervalHours===8?'selected':''}>Setiap 8 jam (1 shift)</option>
          <option value="12" ${state.reminder.intervalHours===12?'selected':''}>Setiap 12 jam</option>
          <option value="24" ${state.reminder.intervalHours===24?'selected':''}>Setiap 24 jam</option>
        </select>
      </div>
      <p class="rt-sub" style="margin-bottom:10px;">
        ${notifSupported
          ? (notifPerm === 'granted'
              ? 'Notifikasi browser sudah aktif.'
              : 'Izinkan notifikasi browser supaya tetap diingatkan walau tab tidak dibuka.')
          : 'Notifikasi browser tidak didukung, tapi banner pengingat di dalam aplikasi tetap berfungsi.'}
      </p>
      ${notifSupported && notifPerm !== 'granted' ? '<button class="rt-btn rt-btn-ghost" id="rtRequestNotifPerm" style="width:100%; justify-content:center; margin-bottom:12px; font-size:12px; padding:8px;">Izinkan Notifikasi Browser</button>' : ''}
      <button class="rt-btn rt-btn-primary" id="rtSaveReminder" style="width:100%; justify-content:center; margin-bottom:18px;">Simpan Pengingat</button>

      <div class="rt-divider"></div>
      <div style="text-align:center; margin-top:14px;">
        <div class="rt-logo" style="width:48px;height:48px;margin:0 auto 10px;">
          <img src="data:image/png;base64,${LOGO_B64}" alt="INTEC">
        </div>
        <p style="margin:0 0 2px; font-size:13px; font-weight:700; font-family:'Space Grotesk',sans-serif;">Resin Tracker</p>
        <p class="rt-sub" style="margin:0 0 10px;">FibreBeam &middot; PT INTEC Persada</p>
        <p style="font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; margin:0 0 6px;">Dibuat oleh</p>
        <p style="font-size:13px; font-weight:600; margin:0;">Rezha &middot; Hamzah</p>
      </div>
    `;
    document.getElementById('rtCloseProfileDropdown').addEventListener('click', closeProfileDropdown);
    const photoInput = document.getElementById('rtPhotoInput');
    photoInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async (ev)=>{
        state.profile.photoDataUrl = ev.target.result;
        await saveProfile();
        updateAvatarButton();
        renderProfileDropdown();
      };
      reader.readAsDataURL(file);
    });
    const removeBtn = document.getElementById('rtRemovePhoto');
    if(removeBtn) removeBtn.addEventListener('click', async ()=>{
      state.profile.photoDataUrl = '';
      await saveProfile();
      updateAvatarButton();
      renderProfileDropdown();
    });
    document.getElementById('rtSaveProfile').addEventListener('click', async ()=>{
      state.profile.name = document.getElementById('f_profileName').value.trim();
      await saveProfile();
      if(!form.leader || form.leader === '') form.leader = state.profile.name;
      closeProfileDropdown();
    });

    document.getElementById('rtThemeToggle').addEventListener('change', (e)=>{
      state.theme = e.target.checked ? 'dark' : 'light';
      applyTheme(); saveTheme();
    });

    const reqBtn = document.getElementById('rtRequestNotifPerm');
    if(reqBtn) reqBtn.addEventListener('click', async ()=>{
      try{ await Notification.requestPermission(); }catch(e){}
      renderProfileDropdown();
    });
    document.getElementById('rtSaveReminder').addEventListener('click', async ()=>{
      state.reminder.enabled = document.getElementById('rtReminderEnabled').checked;
      state.reminder.intervalHours = parseInt(document.getElementById('rtReminderInterval').value, 10);
      await saveReminder();
      renderReminderBanner();
      closeProfileDropdown();
    });
  }

  function openProfileDropdown(){
    renderProfileDropdown();
    document.getElementById('rtProfileDropdown').style.display = 'block';
  }
  function closeProfileDropdown(){
    document.getElementById('rtProfileDropdown').style.display = 'none';
  }

  document.getElementById('rtAvatarBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    const dd = document.getElementById('rtProfileDropdown');
    if(dd.style.display === 'block') closeProfileDropdown();
    else openProfileDropdown();
  });
  document.addEventListener('click', (e)=>{
    const dd = document.getElementById('rtProfileDropdown');
    if(dd.style.display === 'block' && !dd.contains(e.target) && e.target.id !== 'rtAvatarBtn'){
      closeProfileDropdown();
    }
  });


  const CARD1_ADDITIVES = ADDITIVES.filter(a => a.name !== 'Catalyst Perbutyl Z' && a.name !== 'Benzoxe N');

  function additivesTableHtml(baseKg, idPrefix, list){
    const items = list || ADDITIVES;
    return items.map(a=>`<tr><td style="font-family:'Inter',sans-serif;">${a.name}</td><td>${a.pct}%</td><td id="${idPrefix}_${a.name.replace(/\s+/g,'_')}">${fmt(baseKg * a.pct/100)}</td></tr>`).join('');
  }

  function renderConverter(){
    body.dataset.rendered = 'converter';
    const campuranVal = num(state.converter.campuran);
    const murniDariCampuran = campuranVal / CONV_FACTOR * 100;

    const murniVal = num(state.converter.murni);

    body.innerHTML = `
      <div class="rt-card">
        <h2>1) Resin Campuran &rarr; Resin Murni</h2>
        <p class="rt-sub">Masukkan jumlah resin campuran untuk dikonversi menjadi resin murni, beserta rincian kebutuhan bahan lain berdasarkan hasil konversinya.</p>
        <div class="rt-grid">
          <div class="rt-field"><label>Jumlah Resin Campuran (kg)</label><input id="f_convCampuran" type="text" inputmode="decimal" value="${state.converter.campuran}" placeholder="0"></div>
          <div class="rt-field"><label>Hasil Resin Murni (otomatis, kg)</label><input id="f_convMurniHasil" type="text" value="${fmt(murniDariCampuran)}" readonly>
            <span class="rt-hint">Otomatis = Resin Campuran &divide; ${CONV_FACTOR} &times; 100</span>
          </div>
        </div>
        <div class="rt-divider"></div>
        <p class="rt-sub" style="margin-bottom:8px;">Rincian kebutuhan bahan lain (% dari hasil Resin Murni di atas):</p>
        <table class="rt-table">
          <thead><tr><th>Bahan</th><th>%</th><th>Kebutuhan (kg)</th></tr></thead>
          <tbody id="rtConv1Body">${additivesTableHtml(murniDariCampuran, 'c1', CARD1_ADDITIVES)}</tbody>
        </table>
      </div>

      <div class="rt-card">
        <h2>2) Resin Murni &rarr; Kebutuhan Bahan Lain</h2>
        <p class="rt-sub">Masukkan jumlah resin murni untuk melihat langsung rincian kebutuhan bahan lainnya.</p>
        <div class="rt-grid">
          <div class="rt-field"><label>Jumlah Resin Murni (kg)</label><input id="f_convMurni" type="text" inputmode="decimal" value="${state.converter.murni}" placeholder="0"></div>
        </div>
        <div class="rt-divider"></div>
        <p class="rt-sub" style="margin-bottom:8px;">Rincian kebutuhan bahan lain (% dari Resin Murni di atas):</p>
        <table class="rt-table">
          <thead><tr><th>Bahan</th><th>%</th><th>Kebutuhan (kg)</th></tr></thead>
          <tbody id="rtConv2Body">${additivesTableHtml(murniVal, 'c2')}</tbody>
        </table>
      </div>
    `;

    function refreshConverter(){
      const cVal = num(state.converter.campuran);
      const mDariC = cVal / CONV_FACTOR * 100;
      const el1 = document.getElementById('f_convMurniHasil');
      if(el1) el1.value = fmt(mDariC);
      const body1 = document.getElementById('rtConv1Body');
      if(body1) body1.innerHTML = additivesTableHtml(mDariC, 'c1', CARD1_ADDITIVES);

      const mVal = num(state.converter.murni);
      const body2 = document.getElementById('rtConv2Body');
      if(body2) body2.innerHTML = additivesTableHtml(mVal, 'c2');
    }

    document.getElementById('f_convCampuran').addEventListener('input', (e)=>{
      state.converter.campuran = e.target.value;
      refreshConverter();
    });
    document.getElementById('f_convMurni').addEventListener('input', (e)=>{
      state.converter.murni = e.target.value;
      refreshConverter();
    });
  }

  loadAll();
})();
</script>
